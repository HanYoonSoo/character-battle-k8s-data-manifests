apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jenkins
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - jenkins-secret.example.yaml
  - controller-service.yaml
  - controller-statefulset.yaml
configMapGenerator:
  - name: jenkins-jcasc
    files:
      - jcasc.yaml
  - name: jenkins-plugins
    files:
      - plugins.txt
generatorOptions:
  disableNameSuffixHash: true
