apiVersion: v1
kind: Service
metadata:
  name: jenkins-controller
  namespace: jenkins
spec:
  clusterIP: None
  selector:
    app: jenkins-controller
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: agent
      port: 50000
      targetPort: agent
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins
spec:
  type: NodePort
  selector:
    app: jenkins-controller
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-agent
  namespace: jenkins
spec:
  type: ClusterIP
  selector:
    app: jenkins-controller
  ports:
    - name: agent
      port: 50000
      targetPort: agent
