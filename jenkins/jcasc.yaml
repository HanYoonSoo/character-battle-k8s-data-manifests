jenkins:
  systemMessage: "Harness CI controller managed as code."
  numExecutors: ${JENKINS_CONTROLLER_EXECUTORS:-1}
  mode: EXCLUSIVE
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-change_me}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "${JENKINS_URL:-http://jenkins.jenkins.svc.cluster.local:8080/}"
